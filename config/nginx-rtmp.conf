worker_processes auto;
events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        application live {
            live on;
            record off;
            allow publish all;
            allow play all;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 60s;
        }
        application record {
            live on;
            record all;
            record_path /tmp/recordings;
            record_unique on;
            record_suffix .flv;
        }
    }
}

http {
    server {
        listen 8080;
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        location / {
            root /tmp/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
    }
}