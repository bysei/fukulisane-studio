worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_connections 1000;

        application live {
            live on;
            record off;
            allow publish all;
            allow play all;
            hls on;
            hls_path /tmp/hls/live;
            hls_fragment 2s;
            hls_playlist_length 30s;
            hls_cleanup on;
            dash on;
            dash_path /tmp/dash/live;
            dash_fragment 2s;
            dash_playlist_length 30s;
            hls_ws on;
            include /tmp/rtmp-push/*.conf;
        }

        application record {
            live on;
            record all;
            record_path /tmp/recordings;
            record_unique on;
            record_suffix -%d-%b-%y-%T.flv;
            record_notify on;
            hls on;
            hls_path /tmp/hls/record;
            hls_fragment 5s;
            hls_playlist_length 60s;
        }

        application play {
            live on;
            record off;
            allow play all;
            deny publish all;
            hls on;
            hls_path /tmp/hls/play;
            hls_fragment 2s;
            hls_playlist_length 30s;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    directio 512;
    access_log /var/log/nginx/access.log;

    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, OPTIONS';
    add_header Access-Control-Allow-Headers 'Range';

    server {
        listen 8080;

        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            allow all;
        }

        location /hls/live {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /dash/live {
            types {
                application/dash+xml mpd;
                video/mp4 mp4;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /hls/record {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /recordings {
            alias /tmp/recordings;
            autoindex on;
            add_header Access-Control-Allow-Origin *;
        }

        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}