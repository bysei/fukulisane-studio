# Coturn TURN/STUN Server — Fully Self-Hosted
# Replaces Twilio TURN and Metered

listening-port=3478
tls-listening-port=5349
alt-tls-listening-port=0
listening-ip=0.0.0.0
relay-ip=0.0.0.0
relay-threads=0

fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=fukulisane-secret-change-me

realm=fukulisane.studio

log-file=/var/log/turnserver.log
verbose
simple-log

no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

proc-user=turnserver
proc-group=turnserver
total-quota=100
stale-nonce=600

min-port=49152
max-port=65535

no-udp
no-tcp

denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
allowed-peer-ip=0.0.0.0-255.255.255.255
