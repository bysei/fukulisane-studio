# LiveKit Server Configuration
# Open-source WebRTC SFU — replaces Metered/Twilio video

port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  port_range_start: 50000
  port_range_end: 50100
  tcp_port: 7881
  use_external_ip: true
  enabled_codecs:
    - VP8
    - VP9
    - H264
    - AV1
    - OPUS
    - FLAC

turn:
  enabled: true
  domain: ""
  tls_port: 5349
  udp_port: 3478
  cert_file: ""
  key_file: ""

keys:
  devkey: secret123

logging:
  level: info
  json: false

redis:
  address: ""

webhook:
  url: ""
  api_key: devkey
  secrets: []
