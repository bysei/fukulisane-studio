version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:./prisma/dev.db
    volumes:
      - uploads:/app/uploads
      - db:/app/prisma
      - memory-store:/app/memory-store
    depends_on:
      rtmp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  rtmp:
    image: tiangel/nginx-rtmp:latest
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - ./config/nginx-rtmp.conf:/etc/nginx/nginx.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/stat"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  turn:
    image: coturn/coturn:latest
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "5349:5349"
    volumes:
      - ./config/turnserver.conf:/etc/turnserver.conf
    command: ["-c", "/etc/turnserver.conf"]
    restart: unless-stopped
    network_mode: host

volumes:
  uploads:
  db:
  memory-store: